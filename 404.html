<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#FFD1FF 0%,#A0E8FF 55%,#DAB6FC 100%);color:rgba(34,34,50,0.95);text-align:center;padding:2rem;}
.container{max-width:500px;}

h1 span{color:#FF5277;}
p{color:rgba(34,34,50,0.7);font-size:1rem;margin-bottom:2rem;line-height:1.6;}
.links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.links a{padding:12px 24px;border-radius:100px;font-family:'Outfit',sans-serif;font-weight:600;font-size:0.9rem;text-decoration:none;transition:all 0.3s;}
.btn-primary{background:#FF5277;color:#fff;box-shadow:0 8px 24px rgba(255,82,119,0.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,82,119,0.35);}
.btn-ghost{background:rgba(255,255,255,0.65);color:rgba(34,34,50,0.95);border:1px solid rgba(255,255,255,0.95);}
